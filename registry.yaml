# PersonaNexus Voice Pack Registry
# Index of all available personality adapters

version: "0.1"
base_model: HuggingFaceTB/SmolLM2-360M
framework: mlx-lm
adapter_type: lora

packs:
  aquinas:
    name: St. Thomas Aquinas
    status: trained
    category: philosophy-theology
    style: Systematic, scholastic, Q&A structure
    corpus_words: 547000
    training_iters: 1000
    eval_repetition: 0.406
    eval_vocab_richness: 0.430
    eval_theological_density: 0.061
    notes: "High theological density but repetition issues from NewAdvent HTML artifacts. Data cleaning recommended."

  augustine:
    name: St. Augustine of Hippo
    status: trained
    category: philosophy-theology
    style: Introspective, rhetorical, narrative
    corpus_words: 554000
    training_iters: 1000
    eval_repetition: 0.147
    eval_vocab_richness: 0.505
    eval_theological_density: 0.034
    notes: "Best overall quality. Lowest repetition, highest vocab richness. Strong cross-domain transfer."

  chesterton:
    name: G.K. Chesterton
    status: trained
    category: philosophy-theology
    style: Witty, paradoxical, accessible prose
    corpus_words: 332000
    training_iters: 1000
    eval_repetition: 0.217
    eval_vocab_richness: 0.487
    eval_theological_density: 0.031
    notes: "Most consistent voice across categories. Excellent cross-domain transfer to modern topics."

  newman:
    name: John Henry Newman
    status: trained
    category: philosophy-theology
    style: Careful, apologetic, developmental
    corpus_words: 198000
    training_iters: 1000
    eval_repetition: 0.124
    eval_vocab_richness: 0.573
    eval_theological_density: 0.036
    notes: "Lowest repetition of all packs. Best overall quality metrics."

  john-of-the-cross:
    name: St. John of the Cross
    status: planned
    category: spirituality
    style: Mystical, poetic, contemplative
    corpus_source: "NewAdvent: Dark Night, Ascent of Mount Carmel"

  teresa-avila:
    name: St. Teresa of Avila
    status: planned
    category: spirituality
    style: Practical mysticism, direct, warm
    corpus_source: "NewAdvent: Interior Castle, Way of Perfection"

  francis-de-sales:
    name: St. Francis de Sales
    status: planned
    category: spirituality
    style: Gentle, pastoral, devotional
    corpus_source: "Gutenberg: Introduction to the Devout Life"

  lincoln:
    name: Abraham Lincoln
    status: trained
    category: political-rhetoric
    style: Eloquent, principled, frontier plainspoken
    corpus_words: 885000
    training_iters: 1000
    corpus_source: "Gutenberg: Speeches, Letters, Writings Vols 1-7"
    notes: "Strong corpus from 7-volume collected writings. Some repetition at low temp — use temp >= 0.8 for best results."

  shakespeare:
    name: William Shakespeare
    status: trained
    category: literary-drama
    style: Poetic, dramatic, iambic, richly metaphorical
    corpus_words: 935000
    training_iters: 1000
    corpus_source: "Gutenberg: Complete Works"
    notes: "Full Complete Works corpus. Dramatic dialogue style comes through well. Some repetition at low temp."

  dickens:
    name: Charles Dickens
    status: trained
    category: literary-fiction
    style: Vivid, social, satirical, ornate prose
    corpus_words: 1505000
    training_iters: 1000
    corpus_source: "Gutenberg: Tale of Two Cities, Great Expectations, David Copperfield, Pickwick Papers, Oliver Twist, Christmas Carol, Bleak House"
    notes: "Largest corpus (1.5M words, 7 novels). Best quality of the three — vivid Dickensian prose with strong character voice. Best val loss improvement."
