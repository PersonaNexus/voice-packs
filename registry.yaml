    corpus_words: 856000
    training_iters: 1000
    corpus_source: "Gutenberg: Tom Sawyer, Huck Finn, Connecticut Yankee, Roughing It, Innocents Abroad, and more"
    notes: "Val loss 3.151 -> 2.941. Strong satirical voice."

  wilde:
