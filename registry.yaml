    training_iters: 1000
    corpus_source: "Interior Castle, Way of Perfection, Book of Her Life"

  francis-de-sales:
    name: St. Francis de Sales
    status: trained
    category: spirituality
    style: Gentle, pastoral, devotional
    corpus_words: 62000
    training_iters: 1000
    corpus_source: "Gutenberg: Introduction to the Devout Life, Treatise on the Love of God"

  lincoln:
    name: Abraham Lincoln
    status: trained
