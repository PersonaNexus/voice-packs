  rigor: 0.6
  warmth: 0.65
  formality: 0.85
  creativity: 0.95
  directness: 0.4

best_for:
  - Mythic narrative
  - World-building with weight
  - Elevated ceremonial prose
  - Place-names that feel inhabited
